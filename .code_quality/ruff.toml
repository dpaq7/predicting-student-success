# Ruff configuration file
# Ruff replaces: Flake8, isort, pylint, pyupgrade, bandit, and more

target-version = "py310"
line-length = 120

[lint]
# Enable rules
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings  
    "F",      # pyflakes
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "DTZ",    # flake8-datetimez
    "T10",    # flake8-debugger
    "EM",     # flake8-errmsg
    "ISC",    # flake8-implicit-str-concat
    "ICN",    # flake8-import-conventions
    "PIE",    # flake8-pie
    "PT",     # flake8-pytest-style
    "Q",      # flake8-quotes
    "RET",    # flake8-return
    "SIM",    # flake8-simplify
    "TID",    # flake8-tidy-imports
    "ARG",    # flake8-unused-arguments
    "PGH",    # pygrep-hooks
    "PL",     # pylint
    "TRY",    # tryceratops
    "NPY",    # NumPy-specific rules
    "PD",     # pandas-vet
    "S",      # flake8-bandit (security)
    "RUF",    # Ruff-specific rules
]

# Ignore rules
ignore = [
    "E501",   # Line too long (handled by formatter)
    "PD901",  # Avoid using 'df' as variable name
    "PD002",  # Use of pandas.DataFrame.apply
    "S101",   # Use of assert (common in tests)
    "PLR2004", # Magic value used in comparison
    "PLR0913", # Too many arguments
    "TRY003",  # Avoid specifying long messages outside the exception class
    "EM101",   # Exception must not use a string literal
]

# Rules configuration
[lint.per-file-ignores]
"tests/*" = ["S101", "ARG", "PLR2004", "PLR0913"]
"notebooks/*" = ["E402", "F401", "F403", "B018", "T201", "PD901"]

[lint.isort]
known-first-party = ["src"]

[lint.mccabe]
max-complexity = 10

[lint.pep8-naming]
classmethod-decorators = ["classmethod", "pydantic.field_validator"]

[lint.pylint]
max-args = 6
max-branches = 12
max-returns = 6
max-statements = 50

[lint.pyupgrade]
keep-runtime-typing = true

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"