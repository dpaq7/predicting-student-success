name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      
      - name: Set up Python
        run: uv python install 3.10
      
      - name: Install dependencies
        run: |
          uv venv
          uv pip install build twine
      
      - name: Build package
        run: |
          uv run python -m build
      
      - name: Check package
        run: |
          uv run twine check dist/*
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test-package:
    name: Test Package Installation
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      
      - name: Test package installation
        run: |
          uv venv test-env
          uv pip install dist/*.whl
          uv run python -c "import src; print(src.__version__)"

  release:
    name: Create GitHub Release
    needs: test-package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      
      - name: Extract release notes
        id: extract-notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.extract-notes.outputs.version }}
          draft: false
          prerelease: false
          files: dist/*
          generate_release_notes: true
          body: |
            ## What's Changed
            
            See full changelog below.
            
            ## Installation
            
            ```bash
            pip install predicting-student-success
            ```
            
            ## Docker Image
            
            ```bash
            docker pull ghcr.io/dpaq7/predicting-student-success:${{ steps.extract-notes.outputs.version }}
            ```