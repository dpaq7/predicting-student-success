name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Lint, Test, and Check Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev,data]"

      - name: Lint
        run: ruff check src tests

      - name: Test
        run: pytest tests/ --cov=src --cov-report=term-missing

      - name: Check report artifacts
        run: |
          test -f data/08_reporting/analysis_summary.md
          test -f data/08_reporting/tables/classification_metrics.csv
          test -f data/08_reporting/tables/regression_metrics.csv
          test -f data/08_reporting/figures/classification_accuracy_temporal.png
          test -f docs/resume_alignment.md
